<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <style>
    body {
      font-family: Inter, Arial, sans-serif;
      margin: 12px;
      color: #111827;
    }
    h3 {
      margin: 0 0 10px 0;
      font-size: 14px;
    }
    .row {
      margin-bottom: 10px;
    }
    label {
      display: block;
      margin-bottom: 4px;
      font-size: 12px;
      color: #4b5563;
    }
    input, textarea {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 8px;
      font-size: 12px;
    }
    textarea {
      min-height: 110px;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }
    button {
      border: none;
      border-radius: 6px;
      padding: 8px;
      font-size: 12px;
      cursor: pointer;
    }
    .primary {
      background: #2563eb;
      color: #fff;
    }
    .secondary {
      background: #e5e7eb;
      color: #111827;
    }
    .hint {
      margin-top: 10px;
      font-size: 11px;
      color: #6b7280;
      line-height: 1.35;
    }
    .status {
      margin-top: 8px;
      font-size: 11px;
      color: #0f766e;
      min-height: 15px;
    }
  </style>
</head>
<body>
  <h3>Medialive KP Autofill</h3>

  <div class="row">
    <label for="jsonUrl">JSON URL (из калькулятора)</label>
    <input id="jsonUrl" type="text" placeholder="https://.../figma.json" />
  </div>

  <div class="row">
    <label for="jsonManual">Или вставь JSON вручную</label>
    <textarea id="jsonManual" placeholder='{"project_name":"...", "sale_total_rub":"..."}'></textarea>
  </div>

  <div class="row">
    <label>Или заполни поля вручную (без JSON)</label>
    <textarea id="manualFields" placeholder='project_name=КП #66
client=ООО Ромашка
date=02.04.2026
screen_dimensions_mm=5120x3040
sale_total_rub=640744'></textarea>
  </div>

  <div class="buttons">
    <button class="primary" id="applyUrl">Применить по URL</button>
    <button class="secondary" id="applyManual">Применить JSON</button>
  </div>

  <div class="buttons">
    <button class="primary" id="applyFields">Применить поля</button>
    <button class="secondary" id="loadDemo">Демо-поля</button>
  </div>

  <div class="status" id="status"></div>
  <div class="hint">
    Плагин заменяет плейсхолдеры вида <strong>{{key}}</strong> во всех текстовых слоях текущей страницы.
  </div>

  <script>
    const statusEl = document.getElementById("status");

    function setStatus(text, isError = false) {
      statusEl.textContent = text;
      statusEl.style.color = isError ? "#b91c1c" : "#0f766e";
    }

    document.getElementById("applyUrl").onclick = async () => {
      const url = document.getElementById("jsonUrl").value.trim();
      if (!url) {
        setStatus("Укажи URL JSON", true);
        return;
      }
      try {
        setStatus("Загружаю JSON...");
        const resp = await fetch(url, { cache: "no-store" });
        if (!resp.ok) {
          throw new Error("HTTP " + resp.status);
        }
        const data = await resp.json();
        parent.postMessage(
          { pluginMessage: { type: "apply-data", payload: data } },
          "*"
        );
      } catch (e) {
        setStatus("Ошибка загрузки URL: " + e.message, true);
      }
    };

    document.getElementById("applyManual").onclick = () => {
      const raw = document.getElementById("jsonManual").value.trim();
      if (!raw) {
        setStatus("Вставь JSON", true);
        return;
      }
      try {
        const data = JSON.parse(raw);
        parent.postMessage(
          { pluginMessage: { type: "apply-data", payload: data } },
          "*"
        );
      } catch (e) {
        setStatus("Некорректный JSON", true);
      }
    };

    onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;
      if (msg.type === "result") {
        if (msg.ok) {
          const missing = (msg.missingKeys && msg.missingKeys.length)
            ? `, не найдены ключи: ${msg.missingKeys.slice(0, 6).join(", ")}${msg.missingKeys.length > 6 ? "…" : ""}`
            : "";
          setStatus(`Готово: обновлено ${msg.changed} из ${msg.scanned} текстовых слоёв${missing}`);
        } else {
          setStatus(msg.message || "Ошибка", true);
        }
      }
    };

    document.getElementById("applyFields").onclick = () => {
      const raw = document.getElementById("manualFields").value.trim();
      if (!raw) {
        setStatus("Заполни хотя бы одно поле", true);
        return;
      }
      const obj = {};
      raw.split(/\r?\n/).forEach((line) => {
        const s = line.trim();
        if (!s || s.startsWith("#")) return;
        const idx = s.indexOf("=");
        if (idx <= 0) return;
        const key = s.slice(0, idx).trim();
        const val = s.slice(idx + 1).trim();
        if (key) obj[key] = val;
      });
      if (Object.keys(obj).length === 0) {
        setStatus("Формат: key=value", true);
        return;
      }
      parent.postMessage(
        { pluginMessage: { type: "apply-json", data: obj, scope: "selection" } },
        "*"
      );
    };

    document.getElementById("loadDemo").onclick = () => {
      document.getElementById("manualFields").value = [
        "project_name=КП интерьер монолит",
        "client=ООО Ромашка",
        "date=02.04.2026",
        "screen_dimensions_mm=5120x3040",
        "resolution_px=2048x1216",
        "sale_total_rub=640744",
      ].join("\\n");
      setStatus("Демо-поля загружены");
    };
  </script>
</body>
</html>
