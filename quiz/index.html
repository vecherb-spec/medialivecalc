<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Medialive LED Quiz</title>
  <style>
    :root {
      --bg: #040816;
      --shell: #0a1328cc;
      --panel: #0f1b35cc;
      --panel-soft: #111f3c99;
      --muted: #9db0cf;
      --text: #ebf1ff;
      --line: #2a3f69;
      --brand: #67e8f9;
      --brand-strong: #6366f1;
      --ok: #34d399;
      --danger: #f87171;
      --shadow: 0 24px 70px rgba(2, 8, 24, 0.6);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1000px 550px at 84% -8%, #3b82f633 0%, transparent 58%),
        radial-gradient(900px 600px at -5% 102%, #22d3ee2e 0%, transparent 54%),
        linear-gradient(140deg, #020617 0%, #071022 45%, #0a1026 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .quiz-shell {
      max-width: 1100px;
      margin: 0 auto;
      border: 1px solid #2f4875;
      background: linear-gradient(180deg, #0c1731bf 0%, #0a1328e6 100%);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }
    .quiz-head {
      padding: 22px 24px 18px;
      border-bottom: 1px solid #2a3f69;
      background: linear-gradient(130deg, #101d3cba 0%, #11284ca8 45%, #162d5c82 100%);
      backdrop-filter: blur(12px);
    }
    .quiz-brand {
      margin: 0 0 14px;
      font-size: 17px;
      letter-spacing: 0.03em;
      font-weight: 700;
      color: #dff7ff;
      text-transform: uppercase;
    }
    .progress-line {
      height: 12px;
      border-radius: 999px;
      background: #101b37;
      overflow: hidden;
      border: 1px solid #2c4069;
      box-shadow: inset 0 2px 8px #00000055;
    }
    .progress-fill {
      height: 100%;
      width: 0;
      transition: width .32s ease;
      background: linear-gradient(90deg, #22d3ee 0%, #60a5fa 55%, #818cf8 100%);
    }
    .progress-meta {
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-weight: 500;
    }
    .step-pills {
      margin-top: 12px;
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 7px;
    }
    .step-pill {
      border: 1px solid #335283;
      border-radius: 999px;
      padding: 6px 8px;
      text-align: center;
      font-size: 11px;
      color: #9bb8de;
      background: #0f1b36a6;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .step-pill.active {
      color: #e6f6ff;
      border-color: #7cc8ff;
      background: linear-gradient(120deg, #163764, #1b4e7f);
      box-shadow: 0 0 0 2px #67e8f929;
    }
    .step-pill.done {
      color: #d3f9eb;
      border-color: #4aa489;
      background: #11372f;
    }
    .trust-row {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .trust-chip {
      border: 1px solid #36598d;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 11px;
      color: #cde6ff;
      background: #0e1b37b3;
      letter-spacing: .02em;
    }
    .quiz-body {
      padding: 24px;
    }
    .step-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 310px;
      gap: 16px;
      align-items: start;
    }
    .live-preview {
      border: 1px solid #38588a;
      background: linear-gradient(180deg, #0f1d37cc 0%, #0c1830d9 100%);
      border-radius: 16px;
      padding: 14px;
      position: sticky;
      top: 12px;
      backdrop-filter: blur(10px);
      box-shadow: 0 14px 36px rgba(1, 10, 28, 0.5);
    }
    .live-preview h3 {
      margin: 0 0 10px;
      font-size: 13px;
      color: #d8f4ff;
      letter-spacing: .07em;
      text-transform: uppercase;
      font-weight: 700;
    }
    .preview-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 8px;
    }
    .preview-list li {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      border-bottom: 1px dashed #355684;
      padding-bottom: 6px;
      font-size: 12px;
    }
    .preview-list li:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }
    .preview-k { color: #9bc0df; }
    .preview-v {
      text-align: right;
      color: #f0f6ff;
      font-weight: 600;
      max-width: 64%;
      overflow-wrap: anywhere;
    }
    .preview-note {
      margin: 11px 0 0;
      color: #9cc1e4;
      font-size: 11px;
      line-height: 1.35;
    }
    h1.step-title {
      margin: 0;
      font-size: 28px;
      line-height: 1.1;
      letter-spacing: -0.02em;
    }
    .step-hint {
      margin: 9px 0 19px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
      max-width: 720px;
    }
    .option-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
    .option-card {
      width: 100%;
      border: 1px solid #2d4773;
      background: linear-gradient(165deg, #0f1d39df 0%, #10274dd4 100%);
      color: var(--text);
      border-radius: 14px;
      min-height: 74px;
      padding: 14px 16px;
      text-align: left;
      cursor: pointer;
      transition: transform .16s ease, border-color .16s ease, box-shadow .16s ease;
      font-weight: 600;
      font-size: 16px;
      line-height: 1.25;
      box-shadow: 0 6px 16px #02081733;
    }
    .option-card:hover {
      border-color: #5c84be;
      transform: translateY(-1px);
      box-shadow: 0 10px 24px #0208174a;
    }
    .option-card.active {
      border-color: #60a5fa;
      background: linear-gradient(165deg, #123059f2 0%, #173f6dea 100%);
      box-shadow: inset 0 0 0 1px #8cc7ff88, 0 0 0 3px #67e8f926;
    }
    .option-card-title {
      display: block;
      font-weight: 700;
      color: #f3f8ff;
    }
    .option-card-meta {
      display: block;
      margin-top: 4px;
      font-size: 13px;
      line-height: 1.25;
      color: #a6d5ff;
      font-weight: 500;
    }
    .fields {
      display: grid;
      gap: 13px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    .field label {
      font-size: 13px;
      color: #aac0e0;
      font-weight: 500;
    }
    input:not([type="range"]), textarea {
      width: 100%;
      border: 1px solid #335381;
      border-radius: 12px;
      padding: 12px 13px;
      background: #0b1630d9;
      color: var(--text);
      outline: none;
      font-size: 15px;
      transition: border-color .16s ease, box-shadow .16s ease, background .16s ease;
    }
    input:not([type="range"]):focus, textarea:focus {
      border-color: #7cc8ff;
      box-shadow: 0 0 0 3px #67e8f933;
      background: #0d1b36;
    }
    input[type="range"] {
      width: 100%;
      appearance: none;
      height: 18px;
      border-radius: 8px;
      border: 1px solid #325486;
      background: linear-gradient(180deg, #162a4a, #10223e);
      outline: none;
      margin: 10px 0 6px;
    }
    input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 20px;
      height: 34px;
      border-radius: 6px;
      border: 2px solid #0f5e91;
      background: linear-gradient(180deg, #a5f3fc 0%, #67e8f9 52%, #60a5fa 100%);
      cursor: pointer;
      box-shadow: 0 0 0 5px #67e8f92b;
    }
    input[type="range"]::-moz-range-thumb {
      width: 20px;
      height: 34px;
      border-radius: 6px;
      border: 2px solid #0f5e91;
      background: linear-gradient(180deg, #a5f3fc 0%, #67e8f9 52%, #60a5fa 100%);
      cursor: pointer;
      box-shadow: 0 0 0 5px #67e8f92b;
    }
    textarea {
      resize: vertical;
      min-height: 96px;
    }
    .full { grid-column: 1 / -1; }
    .mini-note {
      margin-top: 6px;
      font-size: 12px;
      color: var(--muted);
    }
    .mini-note.ok {
      color: #8df1c4;
      font-weight: 600;
    }
    .error-box {
      margin-top: 14px;
      font-size: 14px;
      color: #ffd6da;
      background: linear-gradient(180deg, #57111d, #3f0d17);
      border: 1px solid #8c2f40;
      border-radius: 12px;
      padding: 11px 13px;
      display: none;
      box-shadow: 0 8px 22px #3e0b1559;
    }
    .quiz-foot {
      border-top: 1px solid #2b416c;
      padding: 15px 24px 22px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      background: linear-gradient(180deg, #0b1730a6 0%, #0b1730d9 100%);
    }
    .btn {
      border-radius: 12px;
      border: 1px solid #355382;
      background: #102140;
      color: #e8f2ff;
      font-weight: 600;
      font-size: 16px;
      padding: 13px 20px;
      min-width: 156px;
      min-height: 52px;
      cursor: pointer;
      transition: transform .14s ease, border-color .14s ease, box-shadow .14s ease, opacity .14s ease;
    }
    .btn:hover:not(:disabled) {
      border-color: #6b92c8;
      transform: translateY(-1px);
      box-shadow: 0 8px 18px #02081740;
    }
    .btn:disabled {
      cursor: not-allowed;
      opacity: .45;
    }
    .btn-primary {
      border-color: #79c9ff;
      color: #06172f;
      background: linear-gradient(130deg, #67e8f9 0%, #60a5fa 46%, #818cf8 100%);
      box-shadow: 0 8px 22px #60a5fa47;
    }
    .btn-primary:hover:not(:disabled) {
      border-color: #b8e4ff;
      box-shadow: 0 10px 28px #67e8f95e;
    }
    .thanks {
      text-align: center;
      padding: 24px 0 8px;
    }
    .thanks h2 {
      margin: 0 0 8px;
      font-size: 30px;
      letter-spacing: -0.01em;
    }
    .thanks p {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.55;
    }
    .step-enter {
      animation: stepIn .22s ease;
      transform-origin: 50% 20%;
    }
    @keyframes stepIn {
      from { opacity: .2; transform: translateY(8px) scale(.995); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @media (max-width: 920px) {
      .step-layout { grid-template-columns: 1fr; }
      .live-preview { position: static; }
    }
    @media (max-width: 760px) {
      body { padding: 10px; }
      .quiz-shell { border-radius: 18px; }
      .quiz-head, .quiz-body, .quiz-foot { padding-left: 14px; padding-right: 14px; }
      .option-grid, .fields { grid-template-columns: 1fr; }
      h1.step-title { font-size: 23px; }
      .quiz-foot .btn { flex: 1; min-width: 0; }
      .option-card {
        min-height: 78px;
        font-size: 17px;
      }
      .btn {
        min-height: 54px;
        font-size: 17px;
      }
      .step-pills { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <main class="quiz-shell">
    <header class="quiz-head">
      <p class="quiz-brand">Medialive · LED Quiz</p>
      <div class="progress-line">
        <div id="progressFill" class="progress-fill"></div>
      </div>
      <div class="progress-meta">
        <span id="progressStep">Шаг 1 из 6</span>
        <span id="progressPercent">17%</span>
      </div>
      <div id="stepPills" class="step-pills" aria-label="Этапы квиза"></div>
      <div class="trust-row">
        <span class="trust-chip">⚡ Заполнение за 60 секунд</span>
        <span class="trust-chip">🧠 Подбор конфигурации по задаче</span>
        <span class="trust-chip">🔒 Данные не передаются третьим лицам</span>
      </div>
    </header>

    <section class="quiz-body">
      <h1 id="stepTitle" class="step-title"></h1>
      <p id="stepHint" class="step-hint"></p>
      <div class="step-layout">
        <div id="stepContent"></div>
        <aside id="livePreview" class="live-preview"></aside>
      </div>
      <div id="errorBox" class="error-box"></div>
    </section>

    <footer id="quizFoot" class="quiz-foot">
      <button id="backBtn" class="btn" type="button">Назад</button>
      <button id="nextBtn" class="btn btn-primary" type="button">Далее</button>
    </footer>
  </main>

  <script>
    const STEP_TOTAL = 6;
    const AUTO_ADVANCE_STEPS = new Set([1, 2, 3, 5]);
    const STORAGE_KEY = "medialive-quiz-state-v1";
    const DEFAULT_WEBHOOK_URL = "https://calc.medialive.ru/incoming";
    const WEBHOOK_URL = window.MEDIALIVE_WEBHOOK_URL || DEFAULT_WEBHOOK_URL;
    const STEP_TITLES = {
      1: "Тип экрана",
      2: "Тип исполнения",
      3: "Шаг пикселя",
      4: "Размеры",
      5: "Монтаж",
      6: "Контакты"
    };
    const STEP_SHORT_TITLES = {
      1: "Тип",
      2: "Исполнение",
      3: "Пиксель",
      4: "Размер",
      5: "Монтаж",
      6: "Контакты"
    };
    const STEP_HINTS = {
      1: "Выберите формат проекта. Это влияет на доступные варианты конструкции.",
      2: "Покажем только релевантные варианты для выбранного типа.",
      3: "Дистанция просмотра зависит от шага пикселя, сценария контента, высоты установки и яркости.",
      4: "Для точного расчёта используем реальные размеры будущего экрана.",
      5: "Выберите вариант работы монтажной команды.",
      6: "Оставьте контакт и город — менеджер пришлёт расчёт и КП."
    };

    const SCREEN_TYPES = ["Уличный", "Интерьерный", "Пилон", "В окно", "Прокатный"];
    const DEPENDENT_TYPES = {
      "Уличный": ["Фасад", "Отдельно стоящий", "Медиафасад"],
      "Интерьерный": ["На стену", "Подвесной", "Отдельно стоящий", "Гибкий"],
      "Пилон": ["Уличный", "Интерьерный"],
      "В окно": ["Уличный (повышенная яркость)", "Интерьерный (обычная яркость)"],
      "Прокатный": ["Интерьерный", "Уличный"]
    };

    const OUTDOOR_PITCH = ["P2.5", "P3", "P4", "P5", "P6", "P8", "P10"];
    const RENTAL_PITCH = ["P1.9", "P2.6", "P3.9", "P4.8"];
    const INDOOR_PITCH = ["P1.25", "P1.5", "P2", "P2.5", "P3.07", "P4"];
    const PITCH_DISTANCE_HINTS = {
      "1.25": "ориентировочно 1.5-3 м",
      "1.5": "ориентировочно 2-3.5 м",
      "1.9": "ориентировочно 2.5-4.5 м",
      "2": "ориентировочно 2.5-4.5 м",
      "2.5": "ориентировочно 3.5-6.5 м",
      "2.6": "ориентировочно 3.5-6.5 м",
      "3": "ориентировочно 4.5-8 м",
      "3.07": "ориентировочно 4.5-8 м",
      "3.9": "ориентировочно 5.5-9.5 м",
      "4": "ориентировочно 6-10 м",
      "4.8": "ориентировочно 7-12 м",
      "5": "ориентировочно 8-13 м",
      "6": "ориентировочно 9-15 м",
      "8": "ориентировочно 12-20 м",
      "10": "ориентировочно 15-25 м"
    };
    const INSTALL_OPTIONS = ["Под ключ", "Шеф-монтаж", "Без монтажа"];
    const CONTACT_METHODS = ["Телефон", "Telegram", "WhatsApp", "Email", "Звонок"];
    const SCREEN_TYPE_ICONS = {
      "Уличный": "🌆",
      "Интерьерный": "🏢",
      "Пилон": "🗼",
      "В окно": "🪟",
      "Прокатный": "🎤"
    };
    const INSTALL_ICONS = {
      "Под ключ": "🛠️",
      "Шеф-монтаж": "👷",
      "Без монтажа": "📦"
    };
    const CONTACT_METHOD_ICONS = {
      "Телефон": "📞",
      "Telegram": "✈️",
      "WhatsApp": "💬",
      "Email": "✉️",
      "Звонок": "☎️"
    };
    const DEFAULT_DIMENSIONS = {
      "Уличный": { widthMm: 5760, heightMm: 2880 },
      "Интерьерный": { widthMm: 5120, heightMm: 3040 },
      "Пилон": { widthMm: 960, heightMm: 1920 },
      "В окно": { widthMm: 960, heightMm: 1280 },
      "Прокатный": { widthM: 5, heightM: 3 }
    };

    const defaultState = {
      step: 1,
      submitted: false,
      sending: false,
      requestId: "",
      screenType: "",
      subtype: "",
      widthMm: "",
      heightMm: "",
      widthM: "",
      heightM: "",
      pixelPitch: "",
      installation: "",
      clientName: "",
      city: "",
      comment: "",
      contactMethod: "Телефон",
      contactValues: {
        "Телефон": "",
        "Telegram": "",
        "WhatsApp": "",
        "Email": "",
        "Звонок": ""
      }
    };

    const state = loadState();

    const progressFill = document.getElementById("progressFill");
    const progressStep = document.getElementById("progressStep");
    const progressPercent = document.getElementById("progressPercent");
    const stepPills = document.getElementById("stepPills");
    const stepTitle = document.getElementById("stepTitle");
    const stepHint = document.getElementById("stepHint");
    const stepContent = document.getElementById("stepContent");
    const livePreview = document.getElementById("livePreview");
    const errorBox = document.getElementById("errorBox");
    const backBtn = document.getElementById("backBtn");
    const nextBtn = document.getElementById("nextBtn");
    const quizFoot = document.getElementById("quizFoot");

    backBtn.addEventListener("click", () => {
      clearError();
      if (state.submitted) {
        resetQuiz();
        return;
      }
      state.step = Math.max(1, state.step - 1);
      persistState();
      render();
    });

    nextBtn.addEventListener("click", async () => {
      clearError();
      if (state.submitted) {
        resetQuiz();
        return;
      }
      const validationError = validateStep(state.step);
      if (validationError) {
        showError(validationError);
        return;
      }
      if (state.step === 6) {
        await submitLead();
        return;
      }
      state.step += 1;
      persistState();
      render();
    });

    function loadState() {
      try {
        const parsed = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
        return {
          ...defaultState,
          ...parsed,
          contactValues: {
            ...defaultState.contactValues,
            ...(parsed.contactValues || {})
          },
          step: Math.min(Math.max(Number(parsed.step || 1), 1), STEP_TOTAL),
          submitted: false,
          sending: false
        };
      } catch (e) {
        return { ...defaultState };
      }
    }

    function persistState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function clearError() {
      errorBox.style.display = "none";
      errorBox.textContent = "";
    }

    function showError(message) {
      errorBox.textContent = message;
      errorBox.style.display = "block";
    }

    function roundToStep(value, step, minValue) {
      if (!Number.isFinite(value)) return minValue;
      const rounded = Math.round(value / step) * step;
      return Math.max(minValue, rounded);
    }

    function formatMeters(value) {
      return (Math.round(Number(value) * 10) / 10).toFixed(1);
    }

    function formatArea(value) {
      return (Math.round(Number(value) * 100) / 100).toFixed(2);
    }

    function extractPitchValue(label) {
      const match = String(label || "").match(/P(\d+(?:\.\d+)?)/i);
      if (!match) return "";
      return Number(match[1]).toString();
    }

    function pitchDistanceHint() {
      const pitch = extractPitchValue(state.pixelPitch);
      if (!pitch) return "";
      return PITCH_DISTANCE_HINTS[pitch] || "подбирается по задаче";
    }

    function currentSizeInfo() {
      const isRental = state.screenType === "Прокатный";
      if (isRental) {
        const w = Number(state.widthM || 0);
        const h = Number(state.heightM || 0);
        if (!(w > 0 && h > 0)) return { size: "—", area: "—" };
        return {
          size: `${formatMeters(w)} × ${formatMeters(h)} м`,
          area: `${formatArea(w * h)} м²`
        };
      }
      const w = Number(state.widthMm || 0);
      const h = Number(state.heightMm || 0);
      if (!(w > 0 && h > 0)) return { size: "—", area: "—" };
      return {
        size: `${w} × ${h} мм`,
        area: `${formatArea((w * h) / 1000000)} м²`
      };
    }

    function renderLivePreview() {
      const size = currentSizeInfo();
      const contact = (state.contactValues[state.contactMethod] || "").trim() || "—";
      const showPixel = state.submitted || state.step >= 3;
      const showSize = state.submitted || state.step >= 4;
      const showInstallation = state.submitted || state.step >= 5;
      const showContacts = state.submitted || state.step >= 6;
      const distance = showPixel ? (pitchDistanceHint() || "—") : "—";
      const sizeLabel = showSize ? size.size : "—";
      const areaLabel = showSize ? size.area : "—";
      const pitchLabel = showPixel ? (state.pixelPitch || "—") : "—";
      const installLabel = showInstallation ? (state.installation || "—") : "—";
      const nameLabel = showContacts ? (state.clientName || "—") : "—";
      const contactLabel = showContacts ? contact : "—";
      livePreview.innerHTML = `
        <h3>Live preview заявки</h3>
        <ul class="preview-list">
          <li><span class="preview-k">Тип</span><span class="preview-v">${escapeHtml(state.screenType || "—")}</span></li>
          <li><span class="preview-k">Исполнение</span><span class="preview-v">${escapeHtml(state.subtype || "—")}</span></li>
          <li><span class="preview-k">Размер</span><span class="preview-v">${escapeHtml(sizeLabel)}</span></li>
          <li><span class="preview-k">Площадь</span><span class="preview-v">${escapeHtml(areaLabel)}</span></li>
          <li><span class="preview-k">Шаг пикселя</span><span class="preview-v">${escapeHtml(pitchLabel)}</span></li>
          <li><span class="preview-k">Дистанция</span><span class="preview-v">${escapeHtml(distance)}</span></li>
          <li><span class="preview-k">Монтаж</span><span class="preview-v">${escapeHtml(installLabel)}</span></li>
          <li><span class="preview-k">Имя</span><span class="preview-v">${escapeHtml(nameLabel)}</span></li>
          <li><span class="preview-k">Город</span><span class="preview-v">${escapeHtml(state.city || "—")}</span></li>
          <li><span class="preview-k">Контакт</span><span class="preview-v">${escapeHtml(contactLabel)}</span></li>
        </ul>
        <p class="preview-note">Подсказка: дистанция указана ориентировочно и зависит от контента, высоты установки, яркости и угла обзора.</p>
      `;
    }

    function webhookCandidates() {
      const urls = [WEBHOOK_URL, "/incoming", DEFAULT_WEBHOOK_URL];
      return [...new Set(urls.filter(Boolean))];
    }

    function applyDefaultDimensionsByType(type) {
      const defaults = DEFAULT_DIMENSIONS[type];
      if (!defaults) return;
      if (type === "Прокатный") {
        state.widthM = String(defaults.widthM);
        state.heightM = String(defaults.heightM);
        state.widthMm = "";
        state.heightMm = "";
        return;
      }
      state.widthMm = String(defaults.widthMm);
      state.heightMm = String(defaults.heightMm);
      state.widthM = "";
      state.heightM = "";
    }

    function ensureDimensionsInitialized() {
      if (!state.screenType) return;
      const defaults = DEFAULT_DIMENSIONS[state.screenType];
      if (!defaults) return;
      if (state.screenType === "Прокатный") {
        if (!(Number(state.widthM) > 0)) state.widthM = String(defaults.widthM);
        if (!(Number(state.heightM) > 0)) state.heightM = String(defaults.heightM);
        return;
      }
      if (!(Number(state.widthMm) > 0)) state.widthMm = String(defaults.widthMm);
      if (!(Number(state.heightMm) > 0)) state.heightMm = String(defaults.heightMm);
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function resolveOutdoorContext() {
      if (state.screenType === "Прокатный") return state.subtype === "Уличный";
      if (state.screenType === "Уличный") return true;
      if (state.screenType === "Пилон") return state.subtype === "Уличный";
      if (state.screenType === "В окно") return state.subtype.startsWith("Уличный");
      return false;
    }

    function renderOptionCards(options, selected, onSelect) {
      const grid = document.createElement("div");
      grid.className = "option-grid";
      options.forEach((option) => {
        const isObject = option && typeof option === "object";
        const optionValue = isObject ? String(option.value || "") : String(option || "");
        const optionLabel = isObject ? String(option.label || optionValue) : optionValue;
        const optionMeta = isObject ? String(option.meta || "") : "";
        const optionIcon = isObject ? String(option.icon || "") : "";
        const button = document.createElement("button");
        button.type = "button";
        button.className = "option-card" + (selected === optionValue ? " active" : "");
        if (optionMeta) {
          const title = document.createElement("span");
          title.className = "option-card-title";
          title.textContent = optionIcon ? `${optionIcon} ${optionLabel}` : optionLabel;
          const meta = document.createElement("span");
          meta.className = "option-card-meta";
          meta.textContent = optionMeta;
          button.appendChild(title);
          button.appendChild(meta);
        } else {
          button.textContent = optionIcon ? `${optionIcon} ${optionLabel}` : optionLabel;
        }
        button.addEventListener("click", () => onSelect(optionValue));
        grid.appendChild(button);
      });
      return grid;
    }

    function renderStepPills() {
      if (!stepPills) return;
      stepPills.innerHTML = "";
      for (let i = 1; i <= STEP_TOTAL; i += 1) {
        const pill = document.createElement("div");
        pill.className = "step-pill";
        if (i < state.step) pill.classList.add("done");
        if (i === state.step) pill.classList.add("active");
        pill.textContent = `${i}. ${STEP_SHORT_TITLES[i] || i}`;
        stepPills.appendChild(pill);
      }
    }

    function renderStep1() {
      const options = SCREEN_TYPES.map((value) => ({
        value,
        label: value,
        icon: SCREEN_TYPE_ICONS[value] || ""
      }));
      const wrap = document.createElement("div");
      wrap.appendChild(
        renderOptionCards(options, state.screenType, (value) => {
          state.screenType = value;
          state.subtype = "";
          state.pixelPitch = "";
          state.installation = "";
          applyDefaultDimensionsByType(value);
          state.step = Math.min(STEP_TOTAL, 2);
          persistState();
          render();
        })
      );
      stepContent.replaceChildren(wrap);
    }

    function renderStep2() {
      const options = DEPENDENT_TYPES[state.screenType] || [];
      const wrap = document.createElement("div");
      wrap.appendChild(
        renderOptionCards(options, state.subtype, (value) => {
          state.subtype = value;
          state.pixelPitch = "";
          state.installation = "";
          state.step = Math.min(STEP_TOTAL, 3);
          persistState();
          render();
        })
      );
      stepContent.replaceChildren(wrap);
    }

    function renderStep3() {
      const wrap = document.createElement("div");
      const fields = document.createElement("div");
      fields.className = "fields";
      const isRental = state.screenType === "Прокатный";
      ensureDimensionsInitialized();

      if (isRental) {
        const widthMValue = Math.max(1, Number(state.widthM || 5));
        const heightMValue = Math.max(1, Number(state.heightM || 3));
        fields.innerHTML = `
          <div class="field">
            <label for="widthM">Ширина, м (бегунок)</label>
            <input id="widthM" type="range" min="1" max="20" step="0.1" value="${escapeHtml(widthMValue)}" />
            <p id="widthMValue" class="mini-note ok"><strong>${formatMeters(widthMValue)} м</strong> (${Math.round(widthMValue * 1000)} мм)</p>
          </div>
          <div class="field">
            <label for="heightM">Высота, м (бегунок)</label>
            <input id="heightM" type="range" min="1" max="12" step="0.1" value="${escapeHtml(heightMValue)}" />
            <p id="heightMValue" class="mini-note ok"><strong>${formatMeters(heightMValue)} м</strong> (${Math.round(heightMValue * 1000)} мм)</p>
          </div>
          <p id="sizeArea" class="mini-note full ok">
            Размер: <strong>${formatMeters(widthMValue)} × ${formatMeters(heightMValue)} м</strong> · Площадь: <strong>${formatArea(widthMValue * heightMValue)} м²</strong>
          </p>
          <p class="mini-note full">Для прокатных экранов размер вводится в метрах.</p>
        `;
        wrap.appendChild(fields);
        stepContent.replaceChildren(wrap);
        const areaSummary = fields.querySelector("#sizeArea");
        const updateRentalArea = () => {
          const w = Number(state.widthM || 0);
          const h = Number(state.heightM || 0);
          areaSummary.innerHTML =
            `Размер: <strong>${formatMeters(w)} × ${formatMeters(h)} м</strong> · Площадь: <strong>${formatArea(w * h)} м²</strong>`;
        };
        fields.querySelector("#widthM").addEventListener("input", (e) => {
          const value = Number(e.target.value || 0);
          state.widthM = String(value);
          fields.querySelector("#widthMValue").innerHTML = `<strong>${formatMeters(value)} м</strong> (${Math.round(value * 1000)} мм)`;
          updateRentalArea();
          persistState();
          renderLivePreview();
        });
        fields.querySelector("#heightM").addEventListener("input", (e) => {
          const value = Number(e.target.value || 0);
          state.heightM = String(value);
          fields.querySelector("#heightMValue").innerHTML = `<strong>${formatMeters(value)} м</strong> (${Math.round(value * 1000)} мм)`;
          updateRentalArea();
          persistState();
          renderLivePreview();
        });
        return;
      }

      const widthValue = roundToStep(Number(state.widthMm || 0), 320, 320);
      const heightValue = roundToStep(Number(state.heightMm || 0), 160, 160);
      state.widthMm = String(widthValue);
      state.heightMm = String(heightValue);

      fields.innerHTML = `
        <div class="field">
          <label for="widthMm">Ширина, мм (бегунок · шаг 320)</label>
          <input id="widthMm" type="range" min="320" max="15360" step="320" value="${escapeHtml(widthValue)}" />
          <p id="widthHint" class="mini-note ok"><strong>${widthValue} мм</strong></p>
        </div>
        <div class="field">
          <label for="heightMm">Высота, мм (бегунок · шаг 160)</label>
          <input id="heightMm" type="range" min="160" max="8640" step="160" value="${escapeHtml(heightValue)}" />
          <p id="heightHint" class="mini-note ok"><strong>${heightValue} мм</strong></p>
        </div>
        <p id="sizeArea" class="mini-note full ok">
          Размер: <strong>${widthValue} × ${heightValue} мм</strong> (${formatMeters(widthValue / 1000)} × ${formatMeters(heightValue / 1000)} м) · Площадь: <strong>${formatArea((widthValue * heightValue) / 1000000)} м²</strong>
        </p>
      `;

      wrap.appendChild(fields);
      stepContent.replaceChildren(wrap);

      const widthInput = fields.querySelector("#widthMm");
      const heightInput = fields.querySelector("#heightMm");
      const widthHint = fields.querySelector("#widthHint");
      const heightHint = fields.querySelector("#heightHint");
      const areaSummary = fields.querySelector("#sizeArea");
      const updateMmArea = () => {
        const w = Number(state.widthMm || 0);
        const h = Number(state.heightMm || 0);
        areaSummary.innerHTML =
          `Размер: <strong>${w} × ${h} мм</strong> (${formatMeters(w / 1000)} × ${formatMeters(h / 1000)} м) · Площадь: <strong>${formatArea((w * h) / 1000000)} м²</strong>`;
      };

      widthInput.addEventListener("input", (e) => {
        const value = Number(e.target.value || 320);
        state.widthMm = String(value);
        persistState();
        widthHint.innerHTML = `<strong>${value} мм</strong>`;
        updateMmArea();
        renderLivePreview();
      });
      heightInput.addEventListener("input", (e) => {
        const value = Number(e.target.value || 160);
        state.heightMm = String(value);
        persistState();
        heightHint.innerHTML = `<strong>${value} мм</strong>`;
        updateMmArea();
        renderLivePreview();
      });
    }

    function renderStep4() {
      const isRental = state.screenType === "Прокатный";
      const options = (isRental ? RENTAL_PITCH : (resolveOutdoorContext() ? OUTDOOR_PITCH : INDOOR_PITCH))
        .map((pitch) => {
          const pitchValue = extractPitchValue(pitch);
          return {
            value: pitch,
            label: pitch,
            meta: PITCH_DISTANCE_HINTS[pitchValue] || ""
          };
        });
      const wrap = document.createElement("div");
      wrap.appendChild(
        renderOptionCards(options, state.pixelPitch, (value) => {
          state.pixelPitch = value;
          state.step = Math.min(STEP_TOTAL, 4);
          persistState();
          render();
        })
      );
      stepContent.replaceChildren(wrap);
    }

    function renderStep5() {
      const options = INSTALL_OPTIONS.map((value) => ({
        value,
        label: value,
        icon: INSTALL_ICONS[value] || ""
      }));
      const wrap = document.createElement("div");
      wrap.appendChild(
        renderOptionCards(options, state.installation, (value) => {
          state.installation = value;
          state.step = Math.min(STEP_TOTAL, 6);
          persistState();
          render();
        })
      );
      stepContent.replaceChildren(wrap);
    }

    function contactValueLabel() {
      switch (state.contactMethod) {
        case "Telegram": return "Telegram (номер или @ник)";
        case "WhatsApp": return "WhatsApp номер";
        case "Email": return "Email";
        case "Звонок": return "Номер для звонка";
        default: return "Телефон";
      }
    }

    function contactPlaceholder() {
      switch (state.contactMethod) {
        case "Telegram": return "@username или +79990000000";
        case "WhatsApp": return "+79990000000";
        case "Email": return "name@example.com";
        case "Звонок": return "+79990000000";
        default: return "+79990000000";
      }
    }

    function renderStep6() {
      const wrap = document.createElement("div");
      const fields = document.createElement("div");
      fields.className = "fields";
      const currentContact = state.contactValues[state.contactMethod] || "";
      fields.innerHTML = `
        <div class="field">
          <label for="clientName">Имя</label>
          <input id="clientName" type="text" value="${escapeHtml(state.clientName)}" placeholder="Как к вам обращаться" />
        </div>
        <div class="field">
          <label>${contactValueLabel()}</label>
          <input id="contactValue" type="text" value="${escapeHtml(currentContact)}" placeholder="${escapeHtml(contactPlaceholder())}" />
        </div>
        <div class="field">
          <label for="city">Город</label>
          <input id="city" type="text" value="${escapeHtml(state.city)}" placeholder="Например, Челябинск" />
        </div>
        <div class="field full">
          <label>Способ связи</label>
          <div id="contactMethods"></div>
        </div>
        <div class="field full">
          <label for="comment">Комментарий</label>
          <textarea id="comment" placeholder="Задача, дедлайн, адрес монтажа, особенности проекта...">${escapeHtml(state.comment)}</textarea>
        </div>
      `;
      wrap.appendChild(fields);
      stepContent.replaceChildren(wrap);

      const methodContainer = fields.querySelector("#contactMethods");
      const methodOptions = CONTACT_METHODS.map((value) => ({
        value,
        label: value,
        icon: CONTACT_METHOD_ICONS[value] || ""
      }));
      methodContainer.appendChild(
        renderOptionCards(methodOptions, state.contactMethod, (value) => {
          state.contactMethod = value;
          persistState();
          renderStep6();
        })
      );

      fields.querySelector("#clientName").addEventListener("input", (e) => {
        state.clientName = e.target.value;
        persistState();
        renderLivePreview();
      });
      fields.querySelector("#city").addEventListener("input", (e) => {
        state.city = e.target.value;
        persistState();
        renderLivePreview();
      });
      fields.querySelector("#comment").addEventListener("input", (e) => {
        state.comment = e.target.value;
        persistState();
      });
      fields.querySelector("#contactValue").addEventListener("input", (e) => {
        state.contactValues[state.contactMethod] = e.target.value;
        persistState();
        renderLivePreview();
      });
    }

    function validateStep(step) {
      if (step === 1 && !state.screenType) return "Выберите тип экрана.";
      if (step === 2 && !state.subtype) return "Выберите тип исполнения.";
      if (step === 3 && !state.pixelPitch) return "Выберите шаг пикселя.";
      if (step === 4) {
        if (state.screenType === "Прокатный") {
          const w = Number(state.widthM);
          const h = Number(state.heightM);
          if (!w || !h || w <= 0 || h <= 0) {
            return "Укажите ширину и высоту в метрах.";
          }
        } else {
          const w = Number(state.widthMm);
          const h = Number(state.heightMm);
          if (!w || !h || w <= 0 || h <= 0) {
            return "Укажите ширину и высоту в миллиметрах.";
          }
          state.widthMm = String(roundToStep(w, 320, 320));
          state.heightMm = String(roundToStep(h, 160, 160));
          persistState();
        }
      }
      if (step === 5 && !state.installation) return "Выберите вариант монтажа.";
      if (step === 6) {
        if (!state.clientName.trim()) return "Введите имя.";
        if (!state.city.trim()) return "Введите город.";
        const contact = (state.contactValues[state.contactMethod] || "").trim();
        if (!contact) return "Укажите контакт для связи.";
      }
      return "";
    }

    function formatProjectName(widthMm, heightMm) {
      const city = state.city.trim() || "Без города";
      return `${state.screenType} ${state.subtype} ${city} ${widthMm}x${heightMm}`.replace(/\s+/g, " ").trim();
    }

    function buildPayload() {
      const isRental = state.screenType === "Прокатный";
      const widthMm = isRental
        ? Math.max(1, Math.round(Number(state.widthM || 0) * 1000))
        : roundToStep(Number(state.widthMm || 0), 320, 320);
      const heightMm = isRental
        ? Math.max(1, Math.round(Number(state.heightM || 0) * 1000))
        : roundToStep(Number(state.heightMm || 0), 160, 160);
      const clientName = state.clientName.trim();
      const contactValue = (state.contactValues[state.contactMethod] || "").trim();
      const messengerMap = {
        "Телефон": "mobile",
        "Telegram": "telegram",
        "WhatsApp": "whatsapp",
        "Email": "email",
        "Звонок": "mobile"
      };
      const env = (state.screenType === "Прокатный")
        ? (state.subtype === "Уличный" ? "Outdoor" : "Indoor")
        : (resolveOutdoorContext() ? "Outdoor" : "Indoor");

      const payload = {
        request_id: `lead-${Date.now()}`,
        project_name: formatProjectName(widthMm, heightMm),
        client_name: clientName || contactValue,
        name: clientName || "",
        city: state.city.trim(),
        type: state.screenType,
        subtype: state.subtype,
        env,
        width_mm: widthMm,
        height_mm: heightMm,
        width_m: isRental ? Number(state.widthM || 0) : null,
        height_m: isRental ? Number(state.heightM || 0) : null,
        pixel_pitch: state.pixelPitch,
        installation_choice: state.installation,
        installation_note: state.installation,
        mount_type: isRental ? "В кабинетах" : "Монолитный (Магниты/Профиль)",
        comment: state.comment.trim(),
        contact_method: state.contactMethod,
        contact_value: contactValue,
        messenger: messengerMap[state.contactMethod] || "mobile",
        phone: ["Телефон", "WhatsApp", "Звонок"].includes(state.contactMethod) ? contactValue : "",
        telegram: state.contactMethod === "Telegram" ? contactValue : "",
        whatsapp: state.contactMethod === "WhatsApp" ? contactValue : "",
        email: state.contactMethod === "Email" ? contactValue : "",
        margin_percent: 30,
        logistics_rub: 0,
        installation_rub: 0,
        display_currency: "RUB",
        vat_mode: "С НДС 22%"
      };
      return payload;
    }

    async function submitLead() {
      if (state.sending) return;
      state.sending = true;
      nextBtn.disabled = true;
      nextBtn.textContent = "Отправляем...";
      persistState();
      try {
        const payload = buildPayload();
        let delivered = false;
        let lastError = null;

        for (const endpoint of webhookCandidates()) {
          try {
            const resp = await fetch(endpoint, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload)
            });
            const data = await resp.json().catch(() => ({}));
            if (!resp.ok || !data.ok) {
              throw new Error(data.error || `HTTP ${resp.status}`);
            }
            delivered = true;
            break;
          } catch (err) {
            lastError = err;
          }
        }

        if (!delivered) {
          throw (lastError || new Error("delivery_failed"));
        }
        state.requestId = payload.request_id;
        state.submitted = true;
        state.sending = false;
        persistState();
        render();
      } catch (err) {
        state.sending = false;
        nextBtn.disabled = false;
        nextBtn.textContent = "Отправить заявку";
        persistState();
        showError("Не удалось отправить заявку. Проверьте интернет и попробуйте еще раз.");
      }
    }

    function resetQuiz() {
      Object.assign(state, JSON.parse(JSON.stringify(defaultState)));
      persistState();
      render();
    }

    function renderThanks() {
      stepTitle.textContent = "Спасибо! Мы скоро с вами свяжемся";
      stepHint.textContent = "Заявка отправлена. Менеджер Medialive уточнит детали и подготовит расчет.";
      stepContent.innerHTML = `
        <div class="thanks">
          <h2>Заявка принята</h2>
          <p>Номер заявки: <strong>${escapeHtml(state.requestId || "—")}</strong></p>
        </div>
      `;
      quizFoot.style.display = "flex";
      backBtn.disabled = false;
      backBtn.textContent = "Новая заявка";
      nextBtn.style.display = "none";
      progressFill.style.width = "100%";
      progressStep.textContent = "Готово";
      progressPercent.textContent = "100%";
    }

    function render() {
      clearError();
      if (state.submitted) {
        renderThanks();
        return;
      }
      if (!state.screenType && state.step > 1) state.step = 1;
      if (!state.subtype && state.step > 2) state.step = 2;
      ensureDimensionsInitialized();

      const percent = Math.round((state.step / STEP_TOTAL) * 100);
      progressFill.style.width = `${percent}%`;
      progressStep.textContent = `Шаг ${state.step} из ${STEP_TOTAL}`;
      progressPercent.textContent = `${percent}%`;
      renderStepPills();

      stepTitle.textContent = `${state.step}. ${STEP_TITLES[state.step]}`;
      stepHint.textContent = STEP_HINTS[state.step];

      quizFoot.style.display = "flex";
      nextBtn.style.display = AUTO_ADVANCE_STEPS.has(state.step) ? "none" : "";
      backBtn.textContent = "Назад";
      backBtn.disabled = state.step === 1;
      nextBtn.disabled = false;
      nextBtn.textContent = state.step === STEP_TOTAL ? "Отправить заявку" : "Далее";

      if (state.step === 1) renderStep1();
      if (state.step === 2) renderStep2();
      if (state.step === 3) renderStep4();
      if (state.step === 4) renderStep3();
      if (state.step === 5) renderStep5();
      if (state.step === 6) renderStep6();
      stepContent.classList.remove("step-enter");
      void stepContent.offsetWidth;
      stepContent.classList.add("step-enter");
      renderLivePreview();
    }

    render();
  </script>
</body>
</html>
